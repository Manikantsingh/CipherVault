name: Signed release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: signed-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-signed-bundle:
    name: Build signed bundle
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      PROD_WEB_CLIENT_ID: ${{ vars.PROD_WEB_CLIENT_ID }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Validate release configuration
        shell: bash
        run: |
          required=(
            PROD_WEB_CLIENT_ID
            ANDROID_KEYSTORE_BASE64
            ANDROID_KEYSTORE_PASSWORD
            ANDROID_KEY_ALIAS
            ANDROID_KEY_PASSWORD
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::$name is not configured for the production environment."
              exit 1
            fi
          done

      - name: Restore upload keystore
        shell: bash
        run: |
          keystore_path="$RUNNER_TEMP/ciphervault-upload.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          chmod 600 "$keystore_path"
          echo "ANDROID_KEYSTORE_PATH=$keystore_path" >> "$GITHUB_ENV"

      - name: Test, lint, and build signed bundle
        run: >-
          ./gradlew --no-daemon
          testReleaseUnitTest
          lintRelease
          bundleRelease
          "-PPROD_WEB_CLIENT_ID=$PROD_WEB_CLIENT_ID"

      - name: Verify bundle signature
        run: jarsigner -verify app/build/outputs/bundle/release/app-release.aab

      - name: Generate checksum
        working-directory: app/build/outputs/bundle/release
        run: sha256sum app-release.aab > app-release.aab.sha256

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-verification-reports
          path: |
            app/build/reports/tests/testReleaseUnitTest/
            app/build/reports/lint-results-release.html
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload signed bundle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ciphervault-${{ github.ref_name }}-signed
          path: |
            app/build/outputs/bundle/release/app-release.aab
            app/build/outputs/bundle/release/app-release.aab.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Remove upload keystore
        if: always()
        run: rm -f "$ANDROID_KEYSTORE_PATH"